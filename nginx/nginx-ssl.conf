# ====================================================================
# HTTPS 版 nginx 設定（由本機 nginx 自行終結 TLS）
# --------------------------------------------------------------------
# 啟用方式（在 .env 設定）：
#   NGINX_CONF=nginx-ssl.conf
#   USE_HTTPS=true
# 並把憑證放到 nginx/certs/（見 nginx/certs/README.md）：
#   nginx/certs/fullchain.pem  伺服器憑證 + 中介鏈
#   nginx/certs/privkey.pem    私鑰
#
# 純 HTTP / 臨時 IP 伺服器時不要用這份，改用 nginx.conf（預設）。
# ====================================================================

upstream oj {
    # oj-web名稱必須一樣(定義在docker-compose.yaml)
    server oj-web:8000;
}

# HTTP(80)：一律 301 轉跳到 HTTPS
server {
    listen 80;
    server_tokens off;
    return 301 https://$host$request_uri;
}

# HTTPS(443)
server {
    listen 443 ssl;

    # 隱藏 nginx 版本號,降低被針對性攻擊的資訊
    server_tokens off;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # 基本 TLS 安全設定
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 擋掉常見的自動化漏洞掃描路徑,直接斷線(444 不回任何內容)
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 444;
    }
    location ~* ^/(vendor|containers|wp-admin|wp-login|wp-content|phpmyadmin|xmlrpc) {
        return 444;
    }

    location / {
        proxy_pass http://oj;  # 轉發到上面定義的upstream oj
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        # 本機 nginx 終結 TLS，把實際協定(https)告知後端 Django，
        # 讓 settings.py 的 SECURE_PROXY_SSL_HEADER 正確判斷為安全連線。
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # 進來的請求的Host頭部轉發給後端服務，需與 ALLOWED_HOSTS 相符
        proxy_set_header Host $host;
    }

    # django static files
    location ^~ /static/ {
        autoindex off;
        alias /app/staticfiles/;
    }

    # 拒絕訪問所有隱藏文件
    location ~ /\. {
        deny all;
    }
}
