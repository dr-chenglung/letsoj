# https://uwsgi-docs-zh.readthedocs.io/zh-cn/latest/tutorials/Django_and_nginx.html

# oj: 自訂名稱
upstream oj {
    # oj-web名稱必須一樣(定義在docker-compose.yaml)
    server oj-web:8000;
}

server {

    listen 80;

    # 隱藏 nginx 版本號,降低被針對性攻擊的資訊
    server_tokens off;

    # 擋掉常見的自動化漏洞掃描路徑,直接斷線(444 不回任何內容),
    # 不轉發給後端 Django,減少無用請求與 log 噪音。
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 444;
    }
    location ~* ^/(vendor|containers|wp-admin|wp-login|wp-content|phpmyadmin|xmlrpc) {
        return 444;
    }

    location / {
        proxy_pass http://oj;  # 轉發到上面定義的upstream oj
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        # 轉發上游代理帶進來的原始通訊協定，讓 Django 在 HTTPS 模式能正確判斷
        # （純 HTTP 時此值為空，Django 視為 http，不會誤判或轉址迴圈）
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_redirect off;
        
        # 進來的請求的Host頭部 (例如localhost, IP, 或域名) 轉發給後端服務
        # 必須與Django settings.py中的ALLOWED_HOSTS設定相符 否則會出現DisallowedHost錯誤
        proxy_set_header Host $host;  
    }

    # django static files 在settings.py中需設定以下搭配路徑 --> STATIC_ROOT = os.path.join(BASE_DIR, 'staticfiles')
    location ^~ /static/ {
        autoindex off;
        alias /app/staticfiles/;
    }

    # 拒絕訪問所有隱藏文件
    location ~ /\. {
        deny all;
    }

}